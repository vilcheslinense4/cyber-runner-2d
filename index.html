<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Runner 2D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="scanlines"></div>

        <a href="https://vilcheslinense4.github.io/Mi-primer-portafolios/" class="btn-volver">⬅️ Volver a Proyectos</a>

        <div class="hud">
            <div class="score-box">SCORE: <span id="current-score">0000</span></div>
            <div class="score-box">MAX: <span id="max-score">0000</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="overlay" class="overlay">
            <div class="menu-box">
                <div class="cyber-badge">SYSTEM: BOOT_READY_</div>
                <h1 class="neon-title">CYBER<br>RUNNER</h1>
                <p id="game-message">> PULSA PARA INICIAR TRANSMISIÓN DE DATOS...</p>
                <button id="start-btn" class="cyber-btn">INICIAR CORE</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
